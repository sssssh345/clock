<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
        crossorigin="anonymous">

    <title>TODOs List</title>

    <style>
        /* General Styling */
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* Navbar Styling */
        .navbar {
            background-color: #343a40;
            padding: 1rem;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff !important;
        }

        .nav-link {
            font-size: 1rem;
            color: #bbb;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: #fff;
        }

        .form-control {
            border-radius: 20px;
        }

        .btn-outline-success {
            border-radius: 20px;
        }

        /* Container Styling */
        .container {
            background-color: #ffffff;
            padding: 30px;
            margin-top: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Heading */
        h2 {
            color: #343a40;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Form Styling */
        .form-group label {
            font-weight: 500;
            color: #555;
        }

        .form-control {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
        }

        #add,
        #clear {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-right: 10px;
        }

        #add:hover,
        #clear:hover {
            background-color: #0056b3;
        }

        /* Table Styling */
        .table {
            margin-top: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
        }

        .table thead {
            background-color: #007bff;
            color: #fff;
        }

        .table th,
        .table td {
            padding: 12px;
            text-align: center;
            font-size: 16px;
            border-bottom: 1px solid #ddd;
        }

        .table tbody tr:hover {
            background-color: #f1f1f1;
        }

        /* Delete Button Styling */
        .btn-sm {
            background-color: #dc3545;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .btn-sm:hover {
            background-color: #c82333;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h2 {
                font-size: 24px;
            }

            .form-control {
                padding: 10px;
            }

            #add,
            #clear {
                padding: 8px 18px;
                font-size: 14px;
            }

            .table th,
            .table td {
                font-size: 14px;
                padding: 8px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="#">TODOs List</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarContent"
            aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
  
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>
            <form class="form-inline">
                <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h2>TODOs List</h2>
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" class="form-control" id="title">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea class="form-control" id="description" rows="3"></textarea>
        </div>
        <button id="add" class="btn">Add to list</button>
        <button id="clear" class="btn" onclick="clearStorage()">Clear list</button>

        <div id="items" class="my-4">
            <h2>Your Items</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>SNo</th>
                        <th>Item Title</th>
                        <th>Item Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function getAndUpdate() {
            let tit = document.getElementById('title').value;
            let desc = document.getElementById('description').value;
            let itemJsonArray = JSON.parse(localStorage.getItem('itemsJson') || '[]');
            itemJsonArray.push([tit, desc]);
            localStorage.setItem('itemsJson', JSON.stringify(itemJsonArray));
            update();
        }

        function update() {
            let tableBody = document.getElementById("tableBody");
            let itemJsonArray = JSON.parse(localStorage.getItem('itemsJson') || '[]');
            tableBody.innerHTML = itemJsonArray.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item[0]}</td>
                    <td>${item[1]}</td>
                    <td><button class="btn btn-sm" onclick="deleted(${index})">Delete</button></td>
                </tr>
            `).join('');
        }

        function deleted(index) {
            let itemJsonArray = JSON.parse(localStorage.getItem('itemsJson'));
            itemJsonArray.splice(index, 1);
            localStorage.setItem('itemsJson', JSON.stringify(itemJsonArray));
            update();
        }

        function clearStorage() {
            if (confirm("Do you really want to clear the list?")) {
                localStorage.clear();
                update();
            }
        }

        document.getElementById("add").addEventListener("click", getAndUpdate);
        update();
    </script>
</body>

</html>
